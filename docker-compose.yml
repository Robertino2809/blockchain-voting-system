services:
  node-1:
    build: .
    container_name: voting-node-1
    environment:
      NODE_ID: node-1
      NODE_HOST: 0.0.0.0
      NODE_PORT: "8001"
      SEED_PEERS: "http://node-2:8002,http://node-3:8003"
      POW_DIFFICULTY: "3"
      DATA_DIR: /app/data
      RAFT_ELECTION_TIMEOUT_MIN: "5.0"
      RAFT_ELECTION_TIMEOUT_MAX: "10.0"
      RAFT_HEARTBEAT_INTERVAL: "1.0"
      HTTP_TIMEOUT: "3"
    ports:
      - "8001:8001"
    volumes:
      - node1-data:/app/data
    networks:
      - voting-net
    restart: unless-stopped

  node-2:
    build: .
    container_name: voting-node-2
    environment:
      NODE_ID: node-2
      NODE_HOST: 0.0.0.0
      NODE_PORT: "8002"
      SEED_PEERS: "http://node-1:8001,http://node-3:8003"
      POW_DIFFICULTY: "3"
      DATA_DIR: /app/data
      RAFT_ELECTION_TIMEOUT_MIN: "5.0"
      RAFT_ELECTION_TIMEOUT_MAX: "10.0"
      RAFT_HEARTBEAT_INTERVAL: "1.0"
      HTTP_TIMEOUT: "3"
    ports:
      - "8002:8002"
    volumes:
      - node2-data:/app/data
    networks:
      - voting-net
    restart: unless-stopped

  node-3:
    build: .
    container_name: voting-node-3
    environment:
      NODE_ID: node-3
      NODE_HOST: 0.0.0.0
      NODE_PORT: "8003"
      SEED_PEERS: "http://node-1:8001,http://node-2:8002"
      POW_DIFFICULTY: "3"
      DATA_DIR: /app/data
      RAFT_ELECTION_TIMEOUT_MIN: "5.0"
      RAFT_ELECTION_TIMEOUT_MAX: "10.0"
      RAFT_HEARTBEAT_INTERVAL: "1.0"
      HTTP_TIMEOUT: "3"
    ports:
      - "8003:8003"
    volumes:
      - node3-data:/app/data
    networks:
      - voting-net
    restart: unless-stopped

volumes:
  node1-data:
  node2-data:
  node3-data:

networks:
  voting-net:
    driver: bridge